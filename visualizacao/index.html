<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede de Conhecimento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04040E;
            --surface: rgba(8,8,18,0.94);
            --text: #E8E4DC;
            --text-dim: #7A7A82;
            --text-muted: #44444C;
            --accent: #B85450;
            --border: rgba(255,255,255,0.04);
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; font-weight: 300;
            overflow: hidden; -webkit-font-smoothing: antialiased;
        }
        #graph { width: 100vw; height: 100vh; }

        #panel {
            position: fixed; right: 0; top: 0; width: 400px; height: 100vh;
            background: var(--surface); border-left: 1px solid var(--border);
            padding: 36px 28px; overflow-y: auto; transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 200; backdrop-filter: blur(24px);
        }
        #panel.open { transform: translateX(0); }
        #panel::-webkit-scrollbar { width: 2px; }
        #panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); }
        #panel .node-type { font-size: 11px; font-weight: 400; letter-spacing: 0.3px; margin-bottom: 8px; opacity: 0.5; }
        #panel h2 {
            font-family: 'Instrument Serif', serif; font-size: 22px; font-weight: 400;
            color: var(--text); margin-bottom: 24px; line-height: 1.35;
            border-left: 3px solid var(--accent); padding-left: 14px;
        }
        #panel .fld { margin-bottom: 16px; }
        #panel .fld-l { font-size: 10px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.4px; margin-bottom: 4px; }
        #panel .fld-v { font-size: 13px; color: var(--text-dim); line-height: 1.65; word-break: break-word; }
        #panel .fld-v a { color: #4A90D9; text-decoration: none; border-bottom: 1px solid rgba(74,144,217,0.3); }
        #panel .close-btn {
            position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; border: none;
            background: transparent; color: var(--text-muted); cursor: pointer; font-size: 22px;
            display: flex; align-items: center; justify-content: center; transition: color 0.2s, background 0.2s;
            border-radius: 6px;
        }
        #panel .close-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
        .pdf-btn {
            display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; padding: 10px 18px;
            background: transparent; border: 1px solid rgba(184,84,80,0.3); border-radius: var(--radius);
            color: var(--accent); font-size: 12px; font-weight: 400; cursor: pointer; transition: all 0.2s;
        }
        .pdf-btn:hover { border-color: var(--accent); background: rgba(184,84,80,0.06); }

        #pdf-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: none; z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        #pdf-modal.open { display: flex; }
        #pdf-modal .wrap { width: 86vw; height: 90vh; background: #0c0c16; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid var(--border); box-shadow: 0 40px 120px rgba(0,0,0,0.6); }
        #pdf-modal .bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); }
        #pdf-modal .bar h3 { font-family: 'Instrument Serif', serif; font-size: 14px; color: var(--text-dim); font-weight: 400; }
        #pdf-modal .bar button { width: 40px; height: 40px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: background 0.2s, color 0.2s; }
        #pdf-modal .bar button:hover { background: rgba(255,255,255,0.08); color: var(--text); }
        #pdf-modal iframe { flex: 1; width: 100%; border: none; }

        #ui { position: fixed; left: 20px; top: 20px; z-index: 100; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; backdrop-filter: blur(16px); min-width: 210px; }
        #ui h1 { font-family: 'Instrument Serif', serif; font-size: 15px; font-weight: 400; color: var(--text); margin-bottom: 12px; }
        #ui select {
            width: 100%; margin-bottom: 12px; padding: 7px 9px; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim);
            font-size: 11px; outline: none; font-family: 'Inter', sans-serif;
        }
        #filters label { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); cursor: pointer; padding: 4px 0; transition: color 0.15s; }
        #filters label:hover { color: var(--text); }
        #filters input[type="checkbox"] { width: 12px; height: 12px; }
        .indicator { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        #search { width: 100%; margin-top: 12px; padding: 8px 11px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); font-size: 11px; outline: none; font-family: 'Inter', sans-serif; }
        #stats { position: fixed; left: 20px; bottom: 16px; font-size: 10px; color: var(--text-muted); z-index: 100; }
        @media (max-width: 768px) { #panel { width: 100vw; } #ui { left: 12px; top: 12px; } }
    </style>
</head>
<body>
    <div id="graph"></div>

    <div id="ui">
        <h1 id="title">Rede de Conhecimento</h1>
        <select id="bundle-select"></select>
        <div id="filters"></div>
        <input type="text" id="search" placeholder="Buscar...">
    </div>

    <div id="stats"></div>

    <div id="panel">
        <button class="close-btn" id="close-panel">&times;</button>
        <div id="panel-inner"></div>
    </div>

    <div id="pdf-modal">
        <div class="wrap">
            <div class="bar">
                <h3 id="pdf-title"></h3>
                <button id="close-modal">&times;</button>
            </div>
            <iframe id="pdf-frame" src=""></iframe>
        </div>
    </div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>

    <script>
    (function() {
        'use strict';

        const DATASETS = '../datasets/';
        const FALLBACK_COLORS = ['#B85450', '#4A90D9', '#C4A96A', '#6AB89A', '#9A6AB8', '#B8946A'];
        const LINK_STYLE = {
            artigo_ementa:  { color: 'rgba(184,84,80,0.14)', width: 0.5, particles: 1 },
            ementa_aula:    { color: 'rgba(196,169,106,0.18)', width: 0.5, particles: 0 },
            artigo_artigo:  { color: 'rgba(200,200,210,0.25)', width: 0.3, particles: 0 },
            sequencia:      { color: 'rgba(200,200,210,0.25)', width: 0.25, particles: 0 },
        };

        let graph, currentData, nodeTypes = {}, activeTypes = {}, nodeTypeById = {};
        const el = document.getElementById('graph');

        boot();

        async function boot() {
            let index;
            try {
                index = await fetchJson(DATASETS + 'index.json');
            } catch (e) { return showError('Não foi possível carregar datasets/index.json. Sirva a partir da raiz do repositório.'); }

            const sel = document.getElementById('bundle-select');
            const bundles = index.bundles || [];
            if (!bundles.length) return showError('Nenhum bundle encontrado em datasets/.');
            bundles.forEach((b, i) => {
                const o = document.createElement('option');
                o.value = b.graph; o.textContent = b.titulo || b.name;
                sel.appendChild(o);
            });
            sel.onchange = () => loadGraph(sel.value);
            loadGraph(bundles[0].graph);
        }

        async function loadGraph(graphRel) {
            let data;
            try { data = await fetchJson(DATASETS + graphRel); }
            catch (e) { return showError('Falha ao carregar ' + graphRel); }
            currentData = data;
            nodeTypes = data.node_types || {};
            assignColors(data);
            document.getElementById('title').textContent = (data.meta && data.meta.titulo) || 'Rede de Conhecimento';
            buildFilters(data);
            render(data);
        }

        function assignColors(data) {
            let i = 0;
            const present = [...new Set(data.nodes.map(n => n.type))];
            present.forEach(t => {
                if (!nodeTypes[t]) nodeTypes[t] = { label: t, color: FALLBACK_COLORS[i % FALLBACK_COLORS.length] };
                if (!nodeTypes[t].color) nodeTypes[t].color = FALLBACK_COLORS[i % FALLBACK_COLORS.length];
                activeTypes[t] = true;
                i++;
            });
            nodeTypeById = {};
            data.nodes.forEach(n => { nodeTypeById[n.id] = n.type; });
        }

        function buildFilters(data) {
            const box = document.getElementById('filters');
            box.innerHTML = '';
            const present = [...new Set(data.nodes.map(n => n.type))];
            present.forEach(t => {
                const lbl = document.createElement('label');
                const cb = document.createElement('input');
                cb.type = 'checkbox'; cb.checked = true; cb.dataset.type = t;
                cb.onchange = () => { activeTypes[t] = cb.checked; applyFilters(); };
                const dot = document.createElement('span');
                dot.className = 'indicator'; dot.style.background = nodeTypes[t].color;
                lbl.appendChild(cb); lbl.appendChild(dot);
                lbl.appendChild(document.createTextNode(' ' + (nodeTypes[t].label || t)));
                box.appendChild(lbl);
            });
        }

        function sizeOf(type) { return 12; }

        function meshOf(node) {
            const c = new THREE.Color(nodeTypes[node.type] ? nodeTypes[node.type].color : '#888');
            let geo;
            if (node.type === 'aula') geo = new THREE.OctahedronGeometry(3.5, 0);
            else if (node.type === 'ementa') geo = new THREE.BoxGeometry(4, 4, 4);
            else if (node.type === 'artigo') geo = new THREE.SphereGeometry(3, 14, 14);
            else geo = new THREE.TetrahedronGeometry(3, 0);
            const mat = new THREE.MeshLambertMaterial({ color: c, emissive: c, emissiveIntensity: 0.25, transparent: true, opacity: 0.9 });
            return new THREE.Mesh(geo, mat);
        }

        function render(data) {
            if (graph) { graph._destructor && graph._destructor(); graph = null; el.innerHTML = ''; }
            document.getElementById('stats').textContent = data.nodes.length + ' nós · ' + data.links.length + ' conexões';
            graph = ForceGraph3D()(el)
                .graphData({ nodes: data.nodes.map(n => ({ ...n })), links: data.links.map(l => ({ ...l })) })
                .backgroundColor('#04040E')
                .showNavInfo(false)
                .nodeLabel(n => esc(n.label || ''))
                .nodeVal(n => sizeOf(n.type))
                .nodeThreeObject(meshOf)
                .linkColor(l => (LINK_STYLE[l.type] || {}).color || 'rgba(122,122,130,0.05)')
                .linkWidth(l => (LINK_STYLE[l.type] || {}).width || 0.3)
                .linkOpacity(0.5)
                .linkDirectionalParticles(l => (LINK_STYLE[l.type] || {}).particles || 0)
                .linkDirectionalParticleWidth(0.8)
                .linkDirectionalParticleSpeed(0.003)
                .warmupTicks(80)
                .cooldownTicks(300)
                .onNodeClick(onNodeClick)
                .onNodeHover(n => { el.style.cursor = n ? 'pointer' : 'default'; });

            setTimeout(() => {
                try {
                    const scene = graph.scene();
                    scene.add(new THREE.AmbientLight(0x404060, 0.7));
                    const l1 = new THREE.PointLight(0x4A90D9, 1.1, 600); l1.position.set(120, 160, 120); scene.add(l1);
                    const l2 = new THREE.PointLight(0xB85450, 0.8, 500); l2.position.set(-150, -90, -110); scene.add(l2);
                } catch (e) {}
            }, 200);
        }

        function _nodeId(x) { return typeof x === 'object' && x !== null ? x.id : x; }

        function applyFilters() {
            if (!graph) return;
            graph.nodeVisibility(n => activeTypes[n.type] !== false);
            graph.linkVisibility(l => {
                const st = nodeTypeById[_nodeId(l.source)];
                const tt = nodeTypeById[_nodeId(l.target)];
                return activeTypes[st] !== false && activeTypes[tt] !== false;
            });
        }

        function onNodeClick(node) {
            if (!node) return;
            const dist = node.type === 'aula' ? 70 : 45;
            graph.cameraPosition(
                { x: node.x + dist, y: node.y + dist * 0.4, z: node.z + dist },
                { x: node.x, y: node.y, z: node.z }, 1000
            );
            highlight(node);
            setTimeout(() => showPanel(node), 250);
        }

        function highlight(node) {
            const nb = new Set([node.id]);
            graph.graphData().links.forEach(l => {
                const s = idOf(l.source), t = idOf(l.target);
                if (s === node.id) nb.add(t);
                if (t === node.id) nb.add(s);
            });
            graph.nodeOpacity(n => nb.has(n.id) ? 1 : 0.04)
                 .linkOpacity(l => (idOf(l.source) === node.id || idOf(l.target) === node.id) ? 0.7 : 0.01);
        }

        function showPanel(node) {
            const tdef = nodeTypes[node.type] || {};
            let html = '<div class="node-type">' + esc(tdef.label || node.type) + '</div>';
            html += '<h2 style="border-left-color:' + (tdef.color || '#B85450') + '">' + esc(node.label || '') + '</h2>';
            const detail = node.detail || {};
            Object.keys(detail).forEach(k => {
                let v = detail[k];
                if (k === 'DOI' && v) v = '<a href="https://doi.org/' + esc(v) + '" target="_blank">' + esc(v) + '</a>';
                else v = esc(v);
                html += fld(k, v);
            });
            // vizinhos
            const neigh = graph.graphData().links
                .filter(l => idOf(l.source) === node.id || idOf(l.target) === node.id)
                .map(l => idOf(l.source) === node.id ? idOf(l.target) : idOf(l.source));
            if (neigh.length) {
                const labels = neigh.map(id => {
                    const n = currentData.nodes.find(x => x.id === id);
                    return n ? '<span class="tag" style="border-color:' + ((nodeTypes[n.type]||{}).color || '#444') + '40">' + esc(trunc(n.label, 42)) + '</span>' : '';
                }).slice(0, 20).join(' ');
                html += fld('Conexões (' + neigh.length + ')', labels);
            }
            if (node.pdf) {
                html += '<button class="pdf-btn" onclick="window._openPdf(\'' + escQ(node.pdf) + '\',\'' + escQ(node.label) + '\')">Abrir PDF</button>';
            }
            document.getElementById('panel-inner').innerHTML = html;
            document.getElementById('panel').classList.add('open');
        }

        window._openPdf = function(path, title) {
            document.getElementById('pdf-title').textContent = title;
            document.getElementById('pdf-frame').src = path;
            document.getElementById('pdf-modal').classList.add('open');
        };

        document.getElementById('close-panel').onclick = () => {
            document.getElementById('panel').classList.remove('open');
            if (graph) {
                graph.nodeOpacity(0.9).linkOpacity(0.5);
                applyFilters();
            }
        };
        document.getElementById('close-modal').onclick = closeModal;
        document.getElementById('pdf-modal').onclick = e => { if (e.target.id === 'pdf-modal') closeModal(); };
        function closeModal() {
            document.getElementById('pdf-modal').classList.remove('open');
            document.getElementById('pdf-frame').src = '';
        }
        document.getElementById('search').oninput = e => {
            if (!graph) return;
            const q = e.target.value.toLowerCase().trim();
            const visibleNodes = new Set();
            currentData.nodes.forEach(n => {
                if (activeTypes[n.type] !== false && (!q || JSON.stringify(n).toLowerCase().includes(q))) {
                    visibleNodes.add(n.id);
                }
            });
            graph.nodeVisibility(n => visibleNodes.has(n.id));
            graph.linkVisibility(l => {
                return visibleNodes.has(_nodeId(l.source)) && visibleNodes.has(_nodeId(l.target));
            });
        };

        function fetchJson(url) { return fetch(url).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }); }
        function idOf(x) { return typeof x === 'object' ? x.id : x; }
        function showError(msg) { document.getElementById('graph').innerHTML = '<p style="padding:40px;color:#666">' + esc(msg) + '</p>'; }
        function fld(l, v) { return v ? '<div class="fld"><div class="fld-l">' + esc(l) + '</div><div class="fld-v">' + v + '</div></div>' : ''; }
        function esc(s) { if (s === null || s === undefined) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
        function escQ(s) { return (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, ' ').replace(/\r/g, ''); }
        function trunc(s, n) { s = String(s || ''); return s.length > n ? s.substring(0, n) + '…' : s; }
    })();
    </script>
</body>
</html>
